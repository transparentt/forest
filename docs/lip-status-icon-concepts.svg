<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
  <rect width="1200" height="500" fill="#f5f5f5"/>
  <style>
    .label { font: 24px -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; fill: #1f1f1f; font-weight: 750; }
    .note { font: 15px -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; fill: #555; }
    .card { fill: #111; rx: 26; }
    .bar { fill: #202020; rx: 16; }
    .icon { fill: #fff; }
  </style>

  <g transform="translate(50 42)">
    <rect class="card" width="250" height="250"/>
    <rect class="bar" x="36" y="198" width="178" height="32"/>
    <g transform="translate(38 51) scale(6.9)">
      <path class="icon" fill-rule="evenodd" d="
        M2.1 9.0
        C5.1 3.9 8.0 1.2 11.2 3.0
        C12.4 3.7 13.6 3.7 14.8 3.0
        C18.0 1.2 20.9 3.9 23.9 9.0
        C20.7 15.6 5.3 15.6 2.1 9.0
        Z
        M4.0 8.95
        C7.7 6.0 18.3 6.0 22.0 8.95
        C17.7 10.9 8.3 10.9 4.0 8.95
        Z"/>
    </g>
    <text class="label" x="0" y="305">A. Clean Pop</text>
    <text class="note" x="0" y="334">元画像の丸みを残した歯なし版。</text>
    <text class="note" x="0" y="360">素直でわかりやすい。</text>
  </g>

  <g transform="translate(335 42)">
    <rect class="card" width="250" height="250"/>
    <rect class="bar" x="36" y="198" width="178" height="32"/>
    <g transform="translate(31 67) scale(7.45)">
      <path class="icon" fill-rule="evenodd" d="
        M1.7 8.6
        C4.6 5.2 7.4 2.5 10.9 3.9
        C12.3 4.5 13.7 4.5 15.1 3.9
        C18.6 2.5 21.4 5.2 24.3 8.6
        C20.5 13.9 5.5 13.9 1.7 8.6
        Z
        M3.7 8.55
        C8.3 6.7 17.7 6.7 22.3 8.55
        C17.3 9.55 8.7 9.55 3.7 8.55
        Z"/>
    </g>
    <text class="label" x="0" y="305">B. Low Profile</text>
    <text class="note" x="0" y="334">横長で薄い。ステータスバー向き。</text>
    <text class="note" x="0" y="360">一番ロゴっぽい。</text>
  </g>

  <g transform="translate(620 42)">
    <rect class="card" width="250" height="250"/>
    <rect class="bar" x="36" y="198" width="178" height="32"/>
    <g transform="translate(37 51) scale(6.9)">
      <path class="icon" fill-rule="evenodd" d="
        M2.0 9.1
        C4.4 3.9 7.5 1.6 10.7 3.7
        C12.1 4.6 13.9 4.6 15.3 3.7
        C18.5 1.6 21.6 3.9 24.0 9.1
        C22.7 15.0 18.2 17.0 13.0 15.5
        C7.8 17.0 3.3 15.0 2.0 9.1
        Z
        M4.1 8.65
        C7.2 5.1 18.8 5.1 21.9 8.65
        C18.0 12.1 8.0 12.1 4.1 8.65
        Z"/>
    </g>
    <text class="label" x="0" y="305">C. Open Cut</text>
    <text class="note" x="0" y="334">口の抜きを強めた、少し攻めた形。</text>
    <text class="note" x="0" y="360">存在感がある。</text>
  </g>

  <g transform="translate(905 42)">
    <rect class="card" width="250" height="250"/>
    <rect class="bar" x="36" y="198" width="178" height="32"/>
    <g transform="translate(42 67) scale(6.6)">
      <path class="icon" fill-rule="evenodd" d="
        M2.0 8.8
        C5.5 4.2 8.8 2.9 11.1 4.6
        C12.3 5.4 13.7 5.4 14.9 4.6
        C17.2 2.9 20.5 4.2 24.0 8.8
        C20.6 13.0 5.4 13.0 2.0 8.8
        Z
        M4.8 8.75
        C9.2 7.45 16.8 7.45 21.2 8.75
        C16.6 9.35 9.4 9.35 4.8 8.75
        Z"/>
    </g>
    <text class="label" x="0" y="305">D. Silent Mark</text>
    <text class="note" x="0" y="334">最小要素だけの抽象ロゴ。</text>
    <text class="note" x="0" y="360">一番クールで控えめ。</text>
  </g>

  <text class="note" x="50" y="444">黒い四角と下のバーは見え方確認用です。実装するアイコン本体は白一色 + 透明背景です。</text>
</svg>
